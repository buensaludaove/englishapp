function speak(text, lang = "en-US") {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

// Build translation dictionary from all module data
function buildDictionary() {
  const esEn = {};
  const enEs = {};
  MODULES_DATA.forEach(mod => {
    mod.lessons.forEach(lesson => {
      lesson.vocabulary.forEach(v => {
        const enLow = v.en.toLowerCase().trim();
        const esLow = v.es.toLowerCase().split("/")[0].trim();
        esEn[esLow] = v.en;
        enEs[enLow] = v.es;
      });
      lesson.expressions.forEach(expr => {
        esEn[expr.es.toLowerCase().trim()] = expr.en;
        enEs[expr.en.toLowerCase().trim()] = expr.es;
      });
    });
  });
  return { esEn, enEs };
}

function translateText(text, direction) {
  const dict = buildDictionary();
  const input = text.toLowerCase().trim();
  // Try local dictionary first
  if (direction === "es-en" && dict.esEn[input]) return Promise.resolve(dict.esEn[input]);
  if (direction === "en-es" && dict.enEs[input]) return Promise.resolve(dict.enEs[input]);
  // Use MyMemory API for anything not in the dictionary
  const langPair = direction === "es-en" ? "es|en" : "en|es";
  return fetch("https://api.mymemory.translated.net/get?q=" + encodeURIComponent(text) + "&langpair=" + langPair)
    .then(r => r.json())
    .then(data => {
      if (data.responseData && data.responseData.translatedText) {
        return data.responseData.translatedText;
      }
      return null;
    })
    .catch(() => null);
}

function comparePronunciation(spoken, target) {
  const normalize = s => s.toLowerCase().replace(/[^a-záéíóúñü\s]/g, "").trim().split(/\s+/);
  const spokenWords = normalize(spoken);
  const targetWords = normalize(target);
  let matches = 0;
  const wordResults = targetWords.map((tw, i) => {
    const sw = spokenWords[i] || "";
    const isMatch = sw === tw || (tw.length > 3 && sw.length > 3 && (tw.includes(sw) || sw.includes(tw)));
    if (isMatch) matches++;
    return { target: tw, spoken: sw, correct: isMatch };
  });
  const score = targetWords.length > 0 ? Math.round((matches / targetWords.length) * 100) : 0;
  return { score, wordResults, matches, total: targetWords.length };
}

                </button>
              ))}
            </div>
          </div>

          <button
            disabled={!onboardingName.trim() || !onboardingRole}
            onClick={() => {
              setUser(u => ({ ...u, name: onboardingName.trim(), role: onboardingRole }));
              setScreen("level_test");
            }}
            style={{ ...btn(), opacity: (!onboardingName.trim() || !onboardingRole) ? 0.4 : 1 }}
          >
            Continuar →
          </button>
        </div>
      </div>
    );
  }

  // ============================================================
  // SCREEN: LEVEL TEST
  // ============================================================
  if (screen === "level_test") {
    const q = LEVEL_TEST[levelTestIndex];
    const progress = ((levelTestIndex) / LEVEL_TEST.length) * 100;

    return (
      <div style={baseStyle}>
        <div style={headerStyle}>
          <span style={{ fontSize: 20 }}>📝</span>
          <span style={{ fontWeight: 700, fontSize: 17 }}>Test de nivel</span>
          <span style={{ marginLeft: "auto", color: colors.textMuted, fontSize: 14 }}>{levelTestIndex + 1}/{LEVEL_TEST.length}</span>
        </div>
        <div style={{ padding: "0 20px", marginTop: 12 }}>
          <div style={{ height: 6, background: colors.card, borderRadius: 3, overflow: "hidden", marginBottom: 24 }}>
            <div style={{ height: "100%", width: `${progress}%`, background: colors.accent, borderRadius: 3, transition: "width 0.3s" }} />
          </div>

          <div style={cardStyle}>
            <p style={{ fontSize: 18, fontWeight: 600, marginBottom: 20, lineHeight: 1.5 }}>{q.question}</p>
            <div style={{ display: "grid", gap: 10 }}>
              {q.options.map(opt => (
                <button
                  key={opt}
                  onClick={() => {
                    const isCorrect = opt === q.answer;
                    const newScore = isCorrect ? levelTestScore + 1 : levelTestScore;
                    if (levelTestIndex < LEVEL_TEST.length - 1) {
                      setLevelTestScore(newScore);
                      setLevelTestIndex(levelTestIndex + 1);
                    } else {
                      const pct = (newScore / LEVEL_TEST.length) * 100;
                      const level = pct < 40 ? "A2" : pct < 70 ? "B1" : "B2";
                      setUser(u => ({ ...u, level }));
                      setScreen("level_result");
                    }
                  }}
                  style={{
                    padding: "14px 16px", borderRadius: 12, fontSize: 16,
                    border: `1px solid ${colors.border}`, background: colors.card,
                    color: colors.text, cursor: "pointer", textAlign: "left",
                    fontFamily: "inherit", fontWeight: 500, transition: "all 0.15s",
                  }}
                >
                  {opt}
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ============================================================
  // SCREEN: LEVEL RESULT
  // ============================================================
  if (screen === "level_result") {
    const pct = Math.round((levelTestScore / LEVEL_TEST.length) * 100);
    return (
      <div style={baseStyle}>
        <div style={{ padding: "60px 24px", textAlign: "center" }}>
          <div style={{ fontSize: 64, marginBottom: 16 }}>🎯</div>
          <h2 style={{ fontSize: 24, fontWeight: 800, marginBottom: 8 }}>Tu nivel: {user.level}</h2>
          <p style={{ color: colors.textMuted, marginBottom: 8 }}>{pct}% respuestas correctas</p>
          <p style={{ color: colors.textMuted, marginBottom: 32, fontSize: 14, lineHeight: 1.6 }}>
            {user.level === "A2" && "Tienes una base. Empezaremos con vocabulario esencial y frases simples."}
            {user.level === "B1" && "Buen nivel intermedio. Trabajaremos situaciones reales de trabajo."}
            {user.level === "B2" && "Nivel avanzado. Nos centraremos en comunicación profesional compleja."}
          </p>
          <button onClick={() => setScreen("dashboard")} style={btn()}>
            Empezar a aprender →
          </button>
        </div>
      </div>
    );
  }

  // ============================================================
  // SCREEN: DASHBOARD
  // ============================================================
  if (screen === "dashboard") {
    const totalLessons = MODULES_DATA.reduce((sum, m) => sum + m.lessons.length, 0);
    const completedCount = user.completedLessons.length;

    return (
      <div style={baseStyle}>
        {/* Header */}
        <div style={{ ...headerStyle, justifyContent: "space-between" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <img src={LOGO_SRC} alt="Buensalud" style={{ height: 28, objectFit: "contain" }} />
            <span style={{ fontWeight: 800, fontSize: 16 }}>English</span>
          </div>
          <button onClick={() => setScreen("profile")} style={{ background: "none", border: "none", cursor: "pointer", padding: 4 }}>
            <div style={{ width: 36, height: 36, borderRadius: "50%", background: colors.accent, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, fontWeight: 800, color: colors.bg }}>
              {user.name.charAt(0).toUpperCase()}
            </div>
          </button>
        </div>

        <div style={{ padding: "20px 20px 100px" }}>
          {/* Stats row */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 24 }}>
            <div style={{ ...cardStyle, textAlign: "center", padding: 14, marginBottom: 0 }}>
              <div style={{ fontSize: 22, fontWeight: 800, color: colors.accent }}>{user.xp}</div>
              <div style={{ fontSize: 11, color: colors.textMuted, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em", marginTop: 2 }}>XP</div>
            </div>
            <div style={{ ...cardStyle, textAlign: "center", padding: 14, marginBottom: 0 }}>
              <div style={{ fontSize: 22, fontWeight: 800, color: colors.warning }}>🔥 {user.streak}</div>
              <div style={{ fontSize: 11, color: colors.textMuted, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em", marginTop: 2 }}>Racha</div>
            </div>
            <div style={{ ...cardStyle, textAlign: "center", padding: 14, marginBottom: 0 }}>
              <div style={{ fontSize: 22, fontWeight: 800, color: "#A78BFA" }}>Nv.{userLevel}</div>
              <div style={{ fontSize: 11, color: colors.textMuted, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em", marginTop: 2 }}>Nivel</div>
            </div>
          </div>

          {/* Progress bar */}
          <div style={{ ...cardStyle, marginBottom: 24 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
              <span style={{ fontSize: 13, fontWeight: 600 }}>Progreso general</span>
              <span style={{ fontSize: 13, color: colors.textMuted }}>{completedCount}/{totalLessons} lecciones</span>
            </div>
            <div style={{ height: 8, background: colors.bg, borderRadius: 4, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${totalLessons > 0 ? (completedCount / totalLessons) * 100 : 0}%`, background: `linear-gradient(90deg, ${colors.accent}, #6EE7B7)`, borderRadius: 4, transition: "width 0.5s" }} />
            </div>
          </div>

          {/* Wrong answers review */}
          {user.wrongAnswers.length > 0 && (
            <button
              onClick={() => { setReviewMode(true); setScreen("review"); }}
              style={{ ...cardStyle, display: "flex", alignItems: "center", gap: 12, cursor: "pointer", width: "100%", textAlign: "left", border: `1px solid ${colors.warning}30`, marginBottom: 24 }}
            >
              <span style={{ fontSize: 28 }}>🔄</span>
              <div>
                <div style={{ fontWeight: 700, fontSize: 15, color: colors.warning }}>Repasar errores</div>
                <div style={{ fontSize: 13, color: colors.textMuted }}>{user.wrongAnswers.length} palabras/frases por repasar</div>
              </div>
            </button>
          )}

          {/* Translator tool */}
          <button
            onClick={() => { setTranslatorText(""); setTranslatorResult(""); setSpokenText(""); setPronFeedback(null); setPronTarget(""); setScreen("translator"); }}
            style={{ ...cardStyle, display: "flex", alignItems: "center", gap: 12, cursor: "pointer", width: "100%", textAlign: "left", border: `1px solid ${colors.accent}30`, marginBottom: 12 }}
          >
            <span style={{ fontSize: 28 }}>🌐</span>
            <div>
              <div style={{ fontWeight: 700, fontSize: 15, color: colors.accent }}>Traductor + Pronunciación</div>
              <div style={{ fontSize: 13, color: colors.textMuted }}>Traduce textos, escucha y practica tu pronunciación</div>
            </div>
          </button>

          {/* Completed lessons for review */}
          {user.completedLessons.length > 0 && (
            <button
              onClick={() => setScreen("completed_lessons")}
              style={{ ...cardStyle, display: "flex", alignItems: "center", gap: 12, cursor: "pointer", width: "100%", textAlign: "left", border: `1px solid #A78BFA30`, marginBottom: 24 }}
            >
              <span style={{ fontSize: 28 }}>📚</span>
              <div>
                <div style={{ fontWeight: 700, fontSize: 15, color: "#A78BFA" }}>Repasar lecciones</div>
                <div style={{ fontSize: 13, color: colors.textMuted }}>{user.completedLessons.length} lecciones completadas disponibles</div>
              </div>
            </button>
          )}

          {/* Modules */}
          <h3 style={{ fontSize: 13, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: colors.textMuted, marginBottom: 14 }}>Módulos</h3>
          <div style={{ display: "grid", gap: 12 }}>
            {MODULES_DATA.map((mod) => {
              const modCompleted = mod.lessons.filter(l => user.completedLessons.includes(l.id)).length;
              const modTotal = mod.lessons.length;
              const pct = modTotal > 0 ? Math.round((modCompleted / modTotal) * 100) : 0;
              return (
                <button
                  key={mod.id}
                  onClick={() => { setCurrentModule(mod); setScreen("module"); }}
                  style={{ ...cardStyle, display: "flex", alignItems: "center", gap: 14, cursor: "pointer", width: "100%", textAlign: "left", marginBottom: 0 }}
                >
                  <div style={{ width: 52, height: 52, borderRadius: 14, background: `${mod.color}20`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, flexShrink: 0 }}>
                    {mod.icon}
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 2 }}>{mod.name}</div>
                    <div style={{ fontSize: 12, color: colors.textMuted, marginBottom: 6 }}>{mod.description}</div>
                    <div style={{ height: 4, background: colors.bg, borderRadius: 2, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${pct}%`, background: mod.color, borderRadius: 2, transition: "width 0.3s" }} />
                    </div>
                  </div>
                  <span style={{ fontSize: 12, color: colors.textMuted, fontWeight: 600 }}>{pct}%</span>
                </button>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ============================================================
  // SCREEN: MODULE
  // ============================================================
  if (screen === "module" && currentModule) {
    return (
      <div style={baseStyle}>
        <div style={headerStyle}>
          <button onClick={() => setScreen("dashboard")} style={{ background: "none", border: "none", color: colors.text, cursor: "pointer", fontSize: 20, padding: 4 }}>←</button>
          <span style={{ fontSize: 22 }}>{currentModule.icon}</span>
          <span style={{ fontWeight: 700, fontSize: 17 }}>{currentModule.name}</span>
        </div>
        <div style={{ padding: 20 }}>
          <div style={{ marginBottom: 20, padding: "12px 16px", borderRadius: 12, background: `${currentModule.color}15`, border: `1px solid ${currentModule.color}30` }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: currentModule.color }}>Nivel: {currentModule.level}</span>
          </div>
          <div style={{ display: "grid", gap: 12 }}>
            {currentModule.lessons.map((lesson, i) => {
              const isCompleted = user.completedLessons.includes(lesson.id);
              return (
                <button
                  key={lesson.id}
                  onClick={() => { setCurrentLesson(lesson); setLessonTab("vocab"); setScreen("lesson"); }}
                  style={{ ...cardStyle, display: "flex", alignItems: "center", gap: 14, cursor: "pointer", width: "100%", textAlign: "left", marginBottom: 0 }}
                >
                  <div style={{
                    width: 44, height: 44, borderRadius: 12,
                    background: isCompleted ? colors.correct : colors.bg,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: isCompleted ? 20 : 16, fontWeight: 700, color: isCompleted ? "#fff" : colors.textMuted,
                    flexShrink: 0,
                  }}>
                    {isCompleted ? "✓" : i + 1}
                  </div>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 15 }}>{lesson.name}</div>
                    <div style={{ fontSize: 12, color: colors.textMuted, marginTop: 2 }}>{lesson.vocabulary.length} palabras · {lesson.expressions.length} expresiones</div>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ============================================================
  // SCREEN: LESSON
  // ============================================================
  if (screen === "lesson" && currentLesson) {
    const tabs = [
      { id: "vocab", label: "Vocabulario", icon: "📖" },
      { id: "expressions", label: "Expresiones", icon: "💬" },
      { id: "dialogues", label: "Diálogos", icon: "🎭" },
    ];

    return (
      <div style={baseStyle}>
        <div style={headerStyle}>
          <button onClick={() => setScreen("module")} style={{ background: "none", border: "none", color: colors.text, cursor: "pointer", fontSize: 20, padding: 4 }}>←</button>
          <span style={{ fontWeight: 700, fontSize: 17 }}>{currentLesson.name}</span>
        </div>

        {/* Tabs */}
        <div style={{ display: "flex", gap: 0, borderBottom: `1px solid ${colors.border}`, padding: "0 12px" }}>
          {tabs.map(t => (
            <button
              key={t.id}
              onClick={() => setLessonTab(t.id)}
              style={{
                flex: 1, padding: "12px 8px", background: "none", border: "none",
                borderBottom: lessonTab === t.id ? `2px solid ${colors.accent}` : "2px solid transparent",
                color: lessonTab === t.id ? colors.accent : colors.textMuted,
                fontFamily: "inherit", fontWeight: 600, fontSize: 13, cursor: "pointer",
              }}
            >
              {t.icon} {t.label}
            </button>
          ))}
        </div>

        <div style={{ padding: "16px 20px 120px", overflowY: "auto" }}>
          {/* VOCAB TAB */}
          {lessonTab === "vocab" && (
            <div style={{ display: "grid", gap: 8 }}>
              {currentLesson.vocabulary.map((v, i) => (
                <div key={i} style={cardStyle}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                        <span style={{ fontWeight: 700, fontSize: 17, color: colors.accent }}>{v.en}</span>
                        <button onClick={() => speak(v.en)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, padding: 2 }}>🔊</button>
                      </div>
                      <div style={{ fontSize: 14, color: colors.textMuted, marginBottom: v.example ? 8 : 0 }}>{v.es}</div>
                      {v.example && (
                        <div style={{ fontSize: 13, color: colors.text, fontStyle: "italic", opacity: 0.8, marginBottom: v.note ? 4 : 0 }}>
                          "{v.example}"
                          <button onClick={() => speak(v.example)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, padding: "0 4px" }}>🔊</button>
                        </div>
                      )}
                      {v.note && <div style={{ fontSize: 12, color: colors.warning, marginTop: 4 }}>💡 {v.note}</div>}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* EXPRESSIONS TAB */}
          {lessonTab === "expressions" && (
            <div style={{ display: "grid", gap: 8 }}>
              {currentLesson.expressions.map((expr, i) => (
                <div key={i} style={cardStyle}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                    <span style={{ fontWeight: 700, fontSize: 15 }}>{expr.en}</span>
                    <button onClick={() => speak(expr.en)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 16 }}>🔊</button>
                  </div>
                  <div style={{ fontSize: 14, color: colors.textMuted }}>{expr.es}</div>
                </div>
              ))}
            </div>
          )}

          {/* DIALOGUES TAB */}
          {lessonTab === "dialogues" && currentLesson.dialogues.length > 0 && (
            <div>
              {currentLesson.dialogues.map((dlg, di) => (
                <div key={di} style={{ marginBottom: 24 }}>
                  <h4 style={{ fontSize: 15, fontWeight: 700, marginBottom: 12, color: colors.accent }}>🎭 {dlg.title}</h4>
                  <div style={{ display: "grid", gap: 8 }}>
                    {dlg.lines.map((line, li) => (
                      <div key={li} style={{ ...cardStyle, marginBottom: 0 }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: colors.textMuted, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 4 }}>{line.speaker}</div>
                        <div style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontWeight: 600, fontSize: 15, marginBottom: 2 }}>{line.en}</div>
                            <button
                              onClick={() => setShowTranslation(s => ({ ...s, [`${di}-${li}`]: !s[`${di}-${li}`] }))}
                              style={{ background: "none", border: "none", color: colors.textMuted, cursor: "pointer", fontSize: 12, padding: 0, fontFamily: "inherit" }}
                            >
                              {showTranslation[`${di}-${li}`] ? line.es : "Ver traducción"}
                            </button>
                          </div>
                          <button onClick={() => speak(line.en)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 16, flexShrink: 0, padding: 4 }}>🔊</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Bottom action */}
        <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, padding: "16px 20px", background: `linear-gradient(transparent, ${colors.bg} 30%)`, paddingTop: 40 }}>
          <button
            onClick={() => {
              addXP(XP_VALUES.lesson_view);
              if (!user.completedLessons.includes(currentLesson.id)) {
                setUser(u => ({ ...u, completedLessons: [...u.completedLessons, currentLesson.id] }));
              }
              setExerciseIndex(0);
              setExerciseScore({ correct: 0, total: 0 });
              setExerciseFeedback(null);
              setExerciseAnswer("");
              setMatchSelections({ left: null, matched: [] });
              setOrderWords([]);
              setScreen("exercises");
            }}
            style={btn()}
          >
            Practicar ejercicios →
          </button>
        </div>
      </div>
    );
  }

  // ============================================================
  // SCREEN: EXERCISES
  // ============================================================
  if (screen === "exercises" && currentLesson) {
    const exercises = currentLesson.exercises;
    if (exerciseIndex >= exercises.length) {
      const pct = exercises.length > 0 ? Math.round((exerciseScore.correct / exercises.length) * 100) : 0;
      return (
        <div style={baseStyle}>
          <div style={{ padding: "60px 24px", textAlign: "center" }}>
            <div style={{ fontSize: 64, marginBottom: 16 }}>{pct >= PASS_THRESHOLD ? "🎉" : "💪"}</div>
            <h2 style={{ fontSize: 24, fontWeight: 800, marginBottom: 8 }}>
              {pct >= PASS_THRESHOLD ? "¡Excelente!" : "Sigue practicando"}
            </h2>
            <p style={{ fontSize: 36, fontWeight: 800, color: pct >= PASS_THRESHOLD ? colors.correct : colors.warning, marginBottom: 8 }}>{pct}%</p>
            <p style={{ color: colors.textMuted, marginBottom: 32 }}>{exerciseScore.correct}/{exercises.length} correctas</p>
            <div style={{ display: "grid", gap: 12 }}>
              <button onClick={() => {
                setTestMode(true);
                setTestIndex(0);
                setTestScore({ correct: 0, total: 0 });
                setTestFeedback(null);
                setScreen("test");
              }} style={btn()}>Hacer test →</button>
              <button onClick={() => setScreen("module")} style={btn(colors.card)}>Volver al módulo</button>
            </div>
          </div>
        </div>
      );
    }

    const ex = exercises[exerciseIndex];
    const progress = ((exerciseIndex) / exercises.length) * 100;

    const submitAnswer = (answer) => {
      let isCorrect = false;
      if (ex.type === "match") {
        isCorrect = matchSelections.matched.length === ex.pairs.length;
      } else {
        const normalize = s => s.toLowerCase().trim().replace(/[?.!,]/g, "");
        isCorrect = normalize(answer) === normalize(ex.answer);
      }

      if (isCorrect) {
        addXP(XP_VALUES.exercise_correct);
        setExerciseScore(s => ({ ...s, correct: s.correct + 1, total: s.total + 1 }));
      } else {
        addXP(XP_VALUES.exercise_wrong);
        setExerciseScore(s => ({ ...s, total: s.total + 1 }));
        // Save wrong answer
        setUser(u => {
          const existing = u.wrongAnswers.find(w => w.question === ex.question);
          if (!existing) {
            return { ...u, wrongAnswers: [...u.wrongAnswers, { ...ex, lessonId: currentLesson.id, timestamp: Date.now() }] };
          }
          return u;
        });
      }
      setExerciseFeedback({ correct: isCorrect, answer: ex.answer || (ex.pairs ? ex.pairs.map(p => `${p[0]} = ${p[1]}`).join(", ") : "") });
    };

    const nextExercise = () => {
      setExerciseFeedback(null);
      setExerciseAnswer("");
      setMatchSelections({ left: null, matched: [] });
      setOrderWords([]);
      setExerciseIndex(exerciseIndex + 1);
    };

    return (
      <div style={baseStyle}>
        <div style={headerStyle}>
          <button onClick={() => setScreen("lesson")} style={{ background: "none", border: "none", color: colors.text, cursor: "pointer", fontSize: 20, padding: 4 }}>←</button>
          <span style={{ fontWeight: 700, fontSize: 17 }}>Ejercicio {exerciseIndex + 1}/{exercises.length}</span>
        </div>

        <div style={{ padding: "0 20px", marginTop: 12 }}>
          <div style={{ height: 6, background: colors.card, borderRadius: 3, overflow: "hidden", marginBottom: 20 }}>
            <div style={{ height: "100%", width: `${progress}%`, background: colors.accent, borderRadius: 3, transition: "width 0.3s" }} />
          </div>

          <div style={{ fontSize: 11, fontWeight: 700, color: colors.textMuted, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>
            {ex.type === "multiple_choice" && "Elige la respuesta correcta"}
            {ex.type === "fill_blank" && "Completa la frase"}
            {ex.type === "translate" && "Traduce al inglés"}
            {ex.type === "order_words" && "Ordena las palabras"}
            {ex.type === "match" && "Empareja"}
          </div>

          <div style={cardStyle}>
            <p style={{ fontSize: 18, fontWeight: 600, marginBottom: 20, lineHeight: 1.5 }}>{ex.question}</p>

            {/* MULTIPLE CHOICE */}
            {ex.type === "multiple_choice" && !exerciseFeedback && (
              <div style={{ display: "grid", gap: 10 }}>
                {ex.options.map(opt => (
                  <button key={opt} onClick={() => submitAnswer(opt)}
                    style={{ padding: "14px 16px", borderRadius: 12, fontSize: 15, border: `1px solid ${colors.border}`, background: colors.bg, color: colors.text, cursor: "pointer", textAlign: "left", fontFamily: "inherit", fontWeight: 500 }}>
                    {opt}
                  </button>
                ))}
              </div>
            )}

            {/* FILL BLANK */}
            {ex.type === "fill_blank" && !exerciseFeedback && (
              <div>
                {ex.hint && <p style={{ fontSize: 13, color: colors.textMuted, marginBottom: 12 }}>Pista: {ex.hint}</p>}
                <input
                  value={exerciseAnswer}
                  onChange={e => setExerciseAnswer(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && exerciseAnswer.trim() && submitAnswer(exerciseAnswer)}
                  placeholder="Escribe tu respuesta"
                  autoFocus
                  style={{ width: "100%", padding: "14px 16px", borderRadius: 12, border: `1px solid ${colors.border}`, background: colors.bg, color: colors.text, fontSize: 16, fontFamily: "inherit", outline: "none", boxSizing: "border-box", marginBottom: 12 }}
                />
                <button onClick={() => exerciseAnswer.trim() && submitAnswer(exerciseAnswer)} disabled={!exerciseAnswer.trim()} style={{ ...btn(), opacity: exerciseAnswer.trim() ? 1 : 0.4 }}>
                  Comprobar
                </button>
              </div>
            )}

            {/* TRANSLATE */}
            {ex.type === "translate" && !exerciseFeedback && (
              <div>
                <input
                  value={exerciseAnswer}
                  onChange={e => setExerciseAnswer(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && exerciseAnswer.trim() && submitAnswer(exerciseAnswer)}
                  placeholder="Escribe en inglés"
                  autoFocus
                  style={{ width: "100%", padding: "14px 16px", borderRadius: 12, border: `1px solid ${colors.border}`, background: colors.bg, color: colors.text, fontSize: 16, fontFamily: "inherit", outline: "none", boxSizing: "border-box", marginBottom: 12 }}
                />
                <button onClick={() => exerciseAnswer.trim() && submitAnswer(exerciseAnswer)} disabled={!exerciseAnswer.trim()} style={{ ...btn(), opacity: exerciseAnswer.trim() ? 1 : 0.4 }}>
                  Comprobar
                </button>
              </div>
            )}

            {/* ORDER WORDS */}
            {ex.type === "order_words" && !exerciseFeedback && (
              <div>
                <div style={{ minHeight: 50, padding: 12, borderRadius: 12, border: `1px dashed ${colors.border}`, marginBottom: 16, display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {orderWords.map((w, i) => (
                    <button key={i} onClick={() => setOrderWords(orderWords.filter((_, j) => j !== i))}
                      style={{ padding: "8px 14px", borderRadius: 8, background: colors.accent, color: colors.bg, fontWeight: 600, fontSize: 14, border: "none", cursor: "pointer", fontFamily: "inherit" }}>
                      {w}
                    </button>
                  ))}
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 16 }}>
                  {ex.words.filter(w => !orderWords.includes(w) || orderWords.filter(x => x === w).length < ex.words.filter(x => x === w).length).map((w, i) => (
                    <button key={`${w}-${i}`} onClick={() => setOrderWords([...orderWords, w])}
                      style={{ padding: "8px 14px", borderRadius: 8, background: colors.card, color: colors.text, fontWeight: 500, fontSize: 14, border: `1px solid ${colors.border}`, cursor: "pointer", fontFamily: "inherit" }}>
                      {w}
                    </button>
                  ))}
                </div>
                <button onClick={() => submitAnswer(orderWords.join(" "))} disabled={orderWords.length !== ex.words.length} style={{ ...btn(), opacity: orderWords.length === ex.words.length ? 1 : 0.4 }}>
                  Comprobar
                </button>
              </div>
            )}

            {/* MATCH */}
            {ex.type === "match" && !exerciseFeedback && (
              <div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  {/* Left column */}
                  <div style={{ display: "grid", gap: 8 }}>
                    {ex.pairs.map(([en], i) => {
                      const isMatched = matchSelections.matched.some(m => m[0] === en);
                      return (
                        <button key={en} disabled={isMatched}
                          onClick={() => setMatchSelections(s => ({ ...s, left: en }))}
                          style={{
                            padding: "10px 12px", borderRadius: 10, fontSize: 14, fontWeight: 600, fontFamily: "inherit",
                            border: matchSelections.left === en ? `2px solid ${colors.accent}` : `1px solid ${colors.border}`,
                            background: isMatched ? `${colors.correct}20` : colors.bg,
                            color: isMatched ? colors.correct : colors.text,
                            cursor: isMatched ? "default" : "pointer", opacity: isMatched ? 0.6 : 1,
                          }}>
                          {en}
                        </button>
                      );
                    })}
                  </div>
                  {/* Right column */}
                  <div style={{ display: "grid", gap: 8 }}>
                    {ex.pairs.map(([en, es]) => {
                      const isMatched = matchSelections.matched.some(m => m[1] === es);
                      return (
                        <button key={es} disabled={isMatched || !matchSelections.left}
                          onClick={() => {
                            if (!matchSelections.left) return;
                            const correctPair = ex.pairs.find(p => p[0] === matchSelections.left);
                            if (correctPair && correctPair[1] === es) {
                              const newMatched = [...matchSelections.matched, [matchSelections.left, es]];
                              setMatchSelections({ left: null, matched: newMatched });
                              if (newMatched.length === ex.pairs.length) {
                                setTimeout(() => submitAnswer("matched"), 300);
                              }
                            } else {
                              setMatchSelections(s => ({ ...s, left: null }));
                            }
                          }}
                          style={{
                            padding: "10px 12px", borderRadius: 10, fontSize: 14, fontWeight: 500, fontFamily: "inherit",
                            border: `1px solid ${colors.border}`,
                            background: isMatched ? `${colors.correct}20` : colors.bg,
                            color: isMatched ? colors.correct : colors.textMuted,
                            cursor: (isMatched || !matchSelections.left) ? "default" : "pointer", opacity: isMatched ? 0.6 : 1,
                          }}>
                          {es}
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

            {/* FEEDBACK */}
            {exerciseFeedback && (
              <div style={{ marginTop: 16 }}>
                <div style={{ padding: 16, borderRadius: 12, background: exerciseFeedback.correct ? `${colors.correct}15` : `${colors.wrong}15`, border: `1px solid ${exerciseFeedback.correct ? colors.correct : colors.wrong}30`, marginBottom: 16 }}>
                  <div style={{ fontWeight: 700, fontSize: 16, color: exerciseFeedback.correct ? colors.correct : colors.wrong, marginBottom: 4 }}>
                    {exerciseFeedback.correct ? "✓ ¡Correcto!" : "✗ Incorrecto"}
                  </div>
                  {!exerciseFeedback.correct && (
                    <div style={{ fontSize: 14, color: colors.textMuted }}>
                      Respuesta correcta: <strong style={{ color: colors.text }}>{exerciseFeedback.answer}</strong>
                    </div>
                  )}
                </div>
                <button onClick={nextExercise} style={btn()}>
                  {exerciseIndex < exercises.length - 1 ? "Siguiente →" : "Ver resultado"}
                </button>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ============================================================
  // SCREEN: TEST
  // ============================================================
  if (screen === "test" && currentLesson) {
    const testQuestions = currentLesson.test;
    if (testIndex >= testQuestions.length) {
      const pct = testQuestions.length > 0 ? Math.round((testScore.correct / testQuestions.length) * 100) : 0;
      const passed = pct >= PASS_THRESHOLD;
      if (passed && !user.completedTests.includes(currentLesson.id)) {
        // Mark test as completed (side effect, but simple)
        if (!user.completedTests.includes(currentLesson.id)) {
          setTimeout(() => {
            addXP(XP_VALUES.test_complete);
            setUser(u => ({ ...u, completedTests: [...u.completedTests, currentLesson.id] }));
          }, 0);
        }
      }
      return (
        <div style={baseStyle}>
          <div style={{ padding: "60px 24px", textAlign: "center" }}>
            <div style={{ fontSize: 64, marginBottom: 16 }}>{passed ? "🏆" : "📚"}</div>
            <h2 style={{ fontSize: 24, fontWeight: 800, marginBottom: 8 }}>{passed ? "¡Test superado!" : "No superado"}</h2>
            <p style={{ fontSize: 42, fontWeight: 800, color: passed ? colors.correct : colors.danger, marginBottom: 8 }}>{pct}%</p>
            <p style={{ color: colors.textMuted, marginBottom: 32 }}>{testScore.correct}/{testQuestions.length} · Mínimo: {PASS_THRESHOLD}%</p>
            <div style={{ display: "grid", gap: 12 }}>
              <button onClick={() => setScreen("module")} style={btn()}>Volver al módulo</button>
              <button onClick={() => setScreen("dashboard")} style={btn(colors.card)}>Dashboard</button>
            </div>
          </div>
        </div>
      );
    }

    const tq = testQuestions[testIndex];
    const progress = ((testIndex) / testQuestions.length) * 100;

    return (
      <div style={baseStyle}>
        <div style={headerStyle}>
          <button onClick={() => setScreen("module")} style={{ background: "none", border: "none", color: colors.text, cursor: "pointer", fontSize: 20, padding: 4 }}>←</button>
          <span style={{ fontWeight: 700, fontSize: 17 }}>Test · {testIndex + 1}/{testQuestions.length}</span>
        </div>
        <div style={{ padding: "0 20px", marginTop: 12 }}>
          <div style={{ height: 6, background: colors.card, borderRadius: 3, overflow: "hidden", marginBottom: 24 }}>
            <div style={{ height: "100%", width: `${progress}%`, background: colors.warning, borderRadius: 3, transition: "width 0.3s" }} />
          </div>

          <div style={cardStyle}>
            <p style={{ fontSize: 18, fontWeight: 600, marginBottom: 20, lineHeight: 1.5 }}>{tq.question}</p>

            {!testFeedback && (
              <div style={{ display: "grid", gap: 10 }}>
                {tq.options.map(opt => (
                  <button key={opt}
                    onClick={() => {
                      const isCorrect = opt === tq.answer;
                      if (isCorrect) {
                        addXP(XP_VALUES.exercise_correct);
                        setTestScore(s => ({ ...s, correct: s.correct + 1, total: s.total + 1 }));
                      } else {
                        setTestScore(s => ({ ...s, total: s.total + 1 }));
                      }
                      setTestFeedback({ correct: isCorrect, answer: tq.answer });
                    }}
                    style={{ padding: "14px 16px", borderRadius: 12, fontSize: 15, border: `1px solid ${colors.border}`, background: colors.bg, color: colors.text, cursor: "pointer", textAlign: "left", fontFamily: "inherit", fontWeight: 500 }}>
                    {opt}
                  </button>
                ))}
              </div>
            )}

            {testFeedback && (
              <div style={{ marginTop: 16 }}>
                <div style={{ padding: 16, borderRadius: 12, background: testFeedback.correct ? `${colors.correct}15` : `${colors.wrong}15`, border: `1px solid ${testFeedback.correct ? colors.correct : colors.wrong}30`, marginBottom: 16 }}>
                  <div style={{ fontWeight: 700, fontSize: 16, color: testFeedback.correct ? colors.correct : colors.wrong }}>
                    {testFeedback.correct ? "✓ ¡Correcto!" : "✗ Incorrecto"}
                  </div>
                  {!testFeedback.correct && <div style={{ fontSize: 14, color: colors.textMuted, marginTop: 4 }}>Respuesta: <strong style={{ color: colors.text }}>{testFeedback.answer}</strong></div>}
                </div>
                <button onClick={() => { setTestFeedback(null); setTestIndex(testIndex + 1); }} style={btn()}>
                  {testIndex < testQuestions.length - 1 ? "Siguiente →" : "Ver resultado"}
                </button>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ============================================================
  // SCREEN: REVIEW (wrong answers)
  // ============================================================
  if (screen === "review") {
    return (
      <div style={baseStyle}>
        <div style={headerStyle}>
          <button onClick={() => setScreen("dashboard")} style={{ background: "none", border: "none", color: colors.text, cursor: "pointer", fontSize: 20, padding: 4 }}>←</button>
          <span style={{ fontWeight: 700, fontSize: 17 }}>🔄 Repasar errores</span>
        </div>
        <div style={{ padding: 20 }}>
          {user.wrongAnswers.length === 0 ? (
            <div style={{ textAlign: "center", padding: 40 }}>
              <div style={{ fontSize: 48, marginBottom: 16 }}>🎉</div>
              <p style={{ color: colors.textMuted }}>¡No tienes errores pendientes!</p>
            </div>
          ) : (
            <div style={{ display: "grid", gap: 8 }}>
              {user.wrongAnswers.map((wa, i) => (
                <div key={i} style={cardStyle}>
                  <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>{wa.question}</div>
                  <div style={{ fontSize: 13, color: colors.correct }}>✓ {wa.answer || (wa.pairs ? wa.pairs.map(p => `${p[0]}→${p[1]}`).join(", ") : "")}</div>
                  <button
                    onClick={() => setUser(u => ({ ...u, wrongAnswers: u.wrongAnswers.filter((_, j) => j !== i) }))}
                    style={{ marginTop: 8, background: "none", border: `1px solid ${colors.border}`, borderRadius: 8, padding: "6px 12px", color: colors.textMuted, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}
                  >
                    Ya lo sé ✓
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ============================================================
  // SCREEN: PROFILE
  // ============================================================
  if (screen === "profile") {
    const totalLessons = MODULES_DATA.reduce((sum, m) => sum + m.lessons.length, 0);
    return (
      <div style={baseStyle}>
        <div style={headerStyle}>
          <button onClick={() => setScreen("dashboard")} style={{ background: "none", border: "none", color: colors.text, cursor: "pointer", fontSize: 20, padding: 4 }}>←</button>
          <span style={{ fontWeight: 700, fontSize: 17 }}>Perfil</span>
        </div>
        <div style={{ padding: 20 }}>
          <div style={{ textAlign: "center", marginBottom: 32 }}>
            <div style={{ width: 80, height: 80, borderRadius: "50%", background: `linear-gradient(135deg, ${colors.accent}, #6EE7B7)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 36, fontWeight: 800, color: colors.bg, margin: "0 auto 12px" }}>
              {user.name.charAt(0).toUpperCase()}
            </div>
            <h2 style={{ fontSize: 22, fontWeight: 800 }}>{user.name}</h2>
            <p style={{ color: colors.textMuted, fontSize: 14 }}>Nivel {user.level} · {user.role}</p>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 24 }}>
            <div style={{ ...cardStyle, textAlign: "center" }}>
              <div style={{ fontSize: 28, fontWeight: 800, color: colors.accent }}>{user.xp}</div>
              <div style={{ fontSize: 12, color: colors.textMuted }}>XP Total</div>
            </div>
            <div style={{ ...cardStyle, textAlign: "center" }}>
              <div style={{ fontSize: 28, fontWeight: 800, color: colors.warning }}>🔥 {user.streak}</div>
              <div style={{ fontSize: 12, color: colors.textMuted }}>Días seguidos</div>
            </div>
            <div style={{ ...cardStyle, textAlign: "center" }}>
              <div style={{ fontSize: 28, fontWeight: 800, color: "#A78BFA" }}>{user.completedLessons.length}</div>
              <div style={{ fontSize: 12, color: colors.textMuted }}>Lecciones</div>
            </div>
            <div style={{ ...cardStyle, textAlign: "center" }}>
              <div style={{ fontSize: 28, fontWeight: 800, color: "#F472B6" }}>{user.completedTests.length}</div>
              <div style={{ fontSize: 12, color: colors.textMuted }}>Tests</div>
            </div>
          </div>

          <button onClick={() => {
            if (confirm("¿Resetear todo el progreso? Esta acción no se puede deshacer.")) {
              localStorage.removeItem(STORAGE_KEY);
              setUser(getDefaultUser());
              setScreen("onboarding");
            }
          }} style={{ ...btn(colors.danger), marginTop: 20 }}>
            Resetear progreso
          </button>
        </div>
      </div>
    );
  }

  // ============================================================
  // SCREEN: TRANSLATOR + PRONUNCIATION
  // ============================================================
  if (screen === "translator") {
    const startRecording = (targetText) => {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        setPronFeedback({ error: "Tu navegador no soporta reconocimiento de voz. Usa Chrome." });
        return;
      }
      const recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      
      recognition.onstart = () => {
        setIsRecording(true);
        setSpokenText("");
        setPronFeedback(null);
        setPronTarget(targetText);
      };
      
      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        setSpokenText(transcript);
        const result = comparePronunciation(transcript, targetText);
        setPronFeedback(result);
      };
      
      recognition.onerror = (event) => {
        setIsRecording(false);
        if (event.error === "no-speech") {
          setPronFeedback({ error: "No se detectó voz. Inténtalo de nuevo." });
        } else {
          setPronFeedback({ error: "Error: " + event.error });
        }
      };
      
      recognition.onend = () => {
        setIsRecording(false);
      };
      
      recognitionRef.current = recognition;
      recognition.start();
    };

    const stopRecording = () => {
      if (recognitionRef.current) {
        recognitionRef.current.stop();
      }
    };

    const handleTranslate = () => {
      if (!translatorText.trim()) return;
      setTranslatorResult("⏳ Traduciendo...");
      translateText(translatorText, translatorDir).then(result => {
        if (result) {
          setTranslatorResult(result);
        } else {
          setTranslatorResult("⚠️ No se pudo traducir. Comprueba el texto e inténtalo de nuevo.");
        }
      });
    };

    return (
      <div style={baseStyle}>
        <div style={headerStyle}>
          <button onClick={() => setScreen("dashboard")} style={{ background: "none", border: "none", color: colors.text, cursor: "pointer", fontSize: 20, padding: 4 }}>←</button>
          <span style={{ fontSize: 20 }}>🌐</span>
          <span style={{ fontWeight: 700, fontSize: 17 }}>Traductor + Pronunciación</span>
        </div>
        <div style={{ padding: 20 }}>
          {/* Direction toggle */}
          <div style={{ display: "flex", gap: 0, marginBottom: 20, borderRadius: 12, overflow: "hidden", border: `1px solid ${colors.border}` }}>
            <button
              onClick={() => { setTranslatorDir("es-en"); setTranslatorResult(""); }}
              style={{ flex: 1, padding: "12px 8px", background: translatorDir === "es-en" ? colors.accent : colors.card, color: translatorDir === "es-en" ? colors.bg : colors.textMuted, border: "none", fontFamily: "inherit", fontWeight: 700, fontSize: 14, cursor: "pointer" }}
            >
              ES → EN
            </button>
            <button
              onClick={() => { setTranslatorDir("en-es"); setTranslatorResult(""); }}
              style={{ flex: 1, padding: "12px 8px", background: translatorDir === "en-es" ? colors.accent : colors.card, color: translatorDir === "en-es" ? colors.bg : colors.textMuted, border: "none", fontFamily: "inherit", fontWeight: 700, fontSize: 14, cursor: "pointer" }}
            >
              EN → ES
            </button>
          </div>

          {/* Text input */}
          <div style={cardStyle}>
            <label style={{ fontSize: 12, fontWeight: 600, color: colors.textMuted, textTransform: "uppercase", letterSpacing: "0.05em", display: "block", marginBottom: 8 }}>
              {translatorDir === "es-en" ? "Escribe en español" : "Escribe en inglés"}
            </label>
            <textarea
              value={translatorText}
              onChange={e => setTranslatorText(e.target.value)}
              placeholder={translatorDir === "es-en" ? "Ej: rendimiento, arrancar la línea..." : "Ej: yield, start the production line..."}
              rows={3}
              style={{ width: "100%", padding: "12px 14px", borderRadius: 10, border: `1px solid ${colors.border}`, background: colors.bg, color: colors.text, fontSize: 16, fontFamily: "inherit", outline: "none", resize: "none", boxSizing: "border-box" }}
            />
            <button onClick={handleTranslate} disabled={!translatorText.trim()} style={{ ...btn(), marginTop: 12, opacity: translatorText.trim() ? 1 : 0.4 }}>
              Traducir
            </button>
          </div>

          {/* Translation result */}
          {translatorResult && (
            <div style={{ ...cardStyle, border: translatorResult.startsWith("⚠️") ? `1px solid ${colors.warning}40` : `1px solid ${colors.accent}40` }}>
              <label style={{ fontSize: 12, fontWeight: 600, color: colors.textMuted, textTransform: "uppercase", letterSpacing: "0.05em", display: "block", marginBottom: 8 }}>Traducción</label>
              <div style={{ fontSize: 20, fontWeight: 700, color: translatorResult.startsWith("⚠️") ? colors.warning : colors.accent, marginBottom: 12, lineHeight: 1.4 }}>
                {translatorResult}
              </div>
              
              {!translatorResult.startsWith("⚠️") && (
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <button
                    onClick={() => speak(translatorResult, translatorDir === "es-en" ? "en-US" : "es-ES")}
                    style={{ ...btn(colors.card, false), display: "flex", alignItems: "center", gap: 6, fontSize: 14, padding: "10px 16px" }}
                  >
                    🔊 Escuchar
                  </button>
                  
                  {translatorDir === "es-en" && (
                    <button
                      onClick={() => isRecording ? stopRecording() : startRecording(translatorResult)}
                      style={{ ...btn(isRecording ? colors.danger : "#7B2D8E", false), display: "flex", alignItems: "center", gap: 6, fontSize: 14, padding: "10px 16px", color: "#fff" }}
                    >
                      {isRecording ? "⏹ Parar" : "🎤 Practicar voz"}
                    </button>
                  )}
                </div>
              )}
            </div>
          )}

          {/* Pronunciation feedback */}
          {pronFeedback && !pronFeedback.error && (
            <div style={{ ...cardStyle, border: `1px solid ${pronFeedback.score >= 70 ? colors.correct : pronFeedback.score >= 40 ? colors.warning : colors.danger}40` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <span style={{ fontSize: 13, fontWeight: 700, color: colors.textMuted, textTransform: "uppercase", letterSpacing: "0.05em" }}>Tu pronunciación</span>
                <span style={{ fontSize: 24, fontWeight: 800, color: pronFeedback.score >= 70 ? colors.correct : pronFeedback.score >= 40 ? colors.warning : colors.danger }}>
                  {pronFeedback.score}%
                </span>
              </div>
              
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 12, color: colors.textMuted, marginBottom: 4 }}>Dijiste:</div>
                <div style={{ fontSize: 16, fontWeight: 600, color: colors.text, fontStyle: "italic" }}>"{spokenText}"</div>
              </div>
              
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 12, color: colors.textMuted, marginBottom: 4 }}>Objetivo:</div>
                <div style={{ fontSize: 16, fontWeight: 600, color: colors.accent }}>"{pronTarget}"</div>
              </div>

              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>
                {pronFeedback.wordResults.map((wr, i) => (
                  <span key={i} style={{
                    padding: "4px 10px", borderRadius: 6, fontSize: 14, fontWeight: 600,
                    background: wr.correct ? `${colors.correct}20` : `${colors.danger}20`,
                    color: wr.correct ? colors.correct : colors.danger,
                  }}>
                    {wr.target}
                  </span>
                ))}
              </div>

              <div style={{ fontSize: 13, color: colors.textMuted, marginBottom: 12 }}>
                {pronFeedback.score >= 90 ? "🌟 ¡Excelente pronunciación!" :
                 pronFeedback.score >= 70 ? "👍 ¡Bien! Unas pocas palabras por mejorar." :
                 pronFeedback.score >= 40 ? "💪 Sigue practicando. Escucha el audio y repite." :
                 "🔄 Inténtalo de nuevo. Escucha primero con 🔊 y luego repite."}
              </div>

              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => speak(pronTarget, "en-US")} style={{ ...btn(colors.card, false), fontSize: 13, padding: "8px 14px" }}>
                  🔊 Escuchar
                </button>
                <button onClick={() => startRecording(pronTarget)} style={{ ...btn("#7B2D8E", false), fontSize: 13, padding: "8px 14px", color: "#fff" }}>
                  🎤 Repetir
                </button>
              </div>
            </div>
          )}

          {pronFeedback && pronFeedback.error && (
            <div style={{ ...cardStyle, border: `1px solid ${colors.danger}40` }}>
              <div style={{ fontSize: 14, color: colors.danger }}>{pronFeedback.error}</div>
            </div>
          )}

          {isRecording && (
            <div style={{ textAlign: "center", padding: 20 }}>
              <div style={{ fontSize: 48, animation: "pulse 1.5s infinite" }}>🎤</div>
              <div style={{ color: colors.accent, fontWeight: 600, marginTop: 8 }}>Escuchando... Habla ahora</div>
              <style>{`@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.1); } }`}</style>
            </div>
          )}

          {/* Quick practice */}
          <div style={{ ...cardStyle, marginTop: 16 }}>
            <h4 style={{ fontSize: 13, fontWeight: 700, color: colors.textMuted, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 12 }}>Práctica rápida de pronunciación</h4>
            <p style={{ fontSize: 13, color: colors.textMuted, marginBottom: 12 }}>Pulsa 🔊 para escuchar, luego 🎤 para grabarte</p>
            <div style={{ display: "grid", gap: 8 }}>
              {[
                "Start the production line",
                "Check the temperature settings",
                "I'll send you a quote shortly",
                "The shipment is scheduled for Monday",
                "Thank you for your inquiry",
                "We have organic certification",
                "Customs clearance is in progress",
                "Looking forward to working with you"
              ].map((phrase, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 12px", borderRadius: 10, background: colors.bg, border: `1px solid ${colors.border}` }}>
                  <span style={{ flex: 1, fontSize: 14, fontWeight: 500 }}>{phrase}</span>
                  <button onClick={() => speak(phrase)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 16, padding: 4, flexShrink: 0 }}>🔊</button>
                  <button onClick={() => startRecording(phrase)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 16, padding: 4, flexShrink: 0 }}>🎤</button>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ============================================================
  // SCREEN: COMPLETED LESSONS (review)
  // ============================================================
  if (screen === "completed_lessons") {
    const completedLessonsList = [];
    MODULES_DATA.forEach(mod => {
      mod.lessons.forEach(lesson => {
        if (user.completedLessons.includes(lesson.id)) {
          completedLessonsList.push({ module: mod, lesson });
        }
      });
    });

    return (
      <div style={baseStyle}>
        <div style={headerStyle}>
          <button onClick={() => setScreen("dashboard")} style={{ background: "none", border: "none", color: colors.text, cursor: "pointer", fontSize: 20, padding: 4 }}>←</button>
          <span style={{ fontSize: 20 }}>📚</span>
          <span style={{ fontWeight: 700, fontSize: 17 }}>Repasar lecciones</span>
        </div>
        <div style={{ padding: 20 }}>
          <p style={{ fontSize: 14, color: colors.textMuted, marginBottom: 20 }}>
            Vuelve a cualquier lección completada para repasar vocabulario, expresiones y ejercicios.
          </p>
          <div style={{ display: "grid", gap: 10 }}>
            {completedLessonsList.map(({ module: mod, lesson }) => (
              <button
                key={lesson.id}
                onClick={() => {
                  setCurrentModule(mod);
                  setCurrentLesson(lesson);
                  setLessonTab("vocab");
                  setScreen("lesson");
                }}
                style={{ ...cardStyle, display: "flex", alignItems: "center", gap: 14, cursor: "pointer", width: "100%", textAlign: "left", marginBottom: 0 }}
              >
                <div style={{ width: 44, height: 44, borderRadius: 12, background: `${mod.color}20`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>
                  {mod.icon}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 15 }}>{lesson.name}</div>
                  <div style={{ fontSize: 12, color: colors.textMuted, marginTop: 2 }}>{mod.name} · {lesson.vocabulary.length} palabras · {lesson.exercises.length} ejercicios</div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                  <span style={{ fontSize: 16, color: colors.correct }}>✓</span>
                  <span style={{ fontSize: 11, color: colors.textMuted }}>Repasar</span>
                </div>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  return null;
}

// Mount the app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
